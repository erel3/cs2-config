// === BINDS (overrides on top of base.cfg defaults) ===

// unused keys
unbind i                                           // loadout HUD (we force cl_showloadout 1)
unbind h                                           // switchhands (freed for practice slow-mo)
unbind "MWHEELUP"

// grenades: letters + decoy on 4
bind z "slot7"                                     // flashbang
bind x "slot8"                                     // smoke
bind c "slot6"                                     // HE grenade
bind v "slot10"                                    // molotov/incendiary
bind "4" "slot9"                                   // decoy
unbind "6"
unbind "7"
unbind "8"
unbind "9"

bind mwheeldown +jump                              // bhop (overrides invnext)

bind "," "playerradio Radio.HoldPosition"          // bot: stay
bind "." "playerradio Radio.Followme"              // bot: follow

bind q "+qsw"                                      // quick switch (no rescope)
alias +qsw "slot3"
alias -qsw "lastinv"

bind "/" "toggle cl_mute_all_but_friends_and_party 0 1" // mute voice toggle

// drop bomb (press alt → switch to C4, release → drop + lastinv)
alias "+dropbomb" "slot5"
alias "-dropbomb" "drop; lastinv"
bind "ALT" "+dropbomb"

// === BINDS ===
bind mwheeldown +jump                              // bhop

bind z "slot7"                                     // flashbang
bind x "slot8"                                     // smoke
bind c "slot6"                                     // HE grenade
bind v "slot10"                                    // molotov/incendiary

bind "," "playerradio Radio.HoldPosition"          // bot: stay
bind "." "playerradio Radio.Followme"              // bot: follow

bind q "+qsw"                                      // quick switch (no rescope)
alias +qsw "slot3"
alias -qsw "lastinv"

bind "/" "toggle cl_mute_all_but_friends_and_party 0 1" // mute voice toggle

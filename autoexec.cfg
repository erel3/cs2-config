// === VIDEO (console-only) ===
r_player_visibility_mode 1
fps_max 400
fps_max_ui 200

// === AUDIO ===
volume 1
snd_headphone_eq 1                                // Crisp
snd_spatialize_lerp 0.7                           // L/R isolation 70%
snd_steamaudio_enable_perspective_correction 0     // perspective correction off
snd_mute_losefocus 0                              // play audio in background
snd_headphone_pan_exponent 2                      // stronger L/R separation
snd_headphone_pan_radial_weight 1.0               // enhanced directional accuracy
snd_mixahead 0.05                                 // lower audio latency

// === MUSIC ===
snd_menumusic_volume 0
snd_roundstart_volume 0
snd_roundaction_volume 0
snd_roundend_volume 0
snd_mvp_volume 0
snd_deathcamera_volume 0
snd_tensecondwarning_volume 0.3
snd_mapobjective_volume 0

// === GAME MODE EQ ===
snd_eq_competitive -1
snd_eq_casual -1
snd_eq_deathmatch -1
snd_eq_arms_race -1

// === GAME ===
con_enable 1
mm_dedicated_search_maxping 150
rate 786432                                        // unrestricted
cl_interp_ratio 1                                  // no buffering
cl_autowepswitch 0                                 // don't auto-switch to picked up weapons
gameinstructor_enable 0                            // no tutorial hints
cl_join_advertise 0                                // nobody can join via status

// === HUD ===
hud_scaling 1
cl_hud_color 0                                     // teammate color
cl_hud_playercount_showcount 0                     // no large player count
cl_hud_background_alpha 0.3                        // cleaner HUD transparency
cl_hud_healthammo_style 1                          // numbers only, no bars
cl_show_equipped_character_for_player_avatars 0     // TODO: verify glow weapon cvar
cl_spec_override_hud 0                             // don't override spectating HUD

// === TEAM ===
cl_teamid_overhead_mode 2                          // all data through walls
cl_teammate_colors_show 1                          // show colors in competitive
lobby_default_privacy_bits2 1                      // friends can join
buddy_looking_to_play 0

// === COMMUNICATION ===
cl_mute_enemy_team 0
cl_mute_all_but_friends_and_party 0
cl_allow_animated_avatars 0
cl_hide_avatar_images 0                            // show all
cl_sanitize_player_names 0

// === SPECTATOR ===
cl_scoreboard_mouse_enable_binding +attack2        // secondary fire
cl_endofmatch_replay_enabled 1                     // TODO: verify cvar name
spec_replay_smoothing 1                            // TODO: verify cvar name
cl_spec_smooth_speed 1.0                           // TODO: verify cvar name

// === ITEM / VIEWMODEL ===
cl_silencer_mode 0                                 // don't detach silencer
viewmodel_fov 68                                   // m0NESY viewmodel
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5
r_drawtracers_firstperson 0                        // hide own bullet tracers
switchhandsright                                   // right hand viewmodel
cl_showloadout 1                                   // always show inventory
cl_use_opens_buy_menu 1
cl_buy_menu_number_action 0                        // number keys buy items
// buy menu donation key = left ctrl               // TODO: verify cvar, may need in-game UI

// === RADAR ===
cl_radar_always_centered 0                         // don't center on player
cl_radar_rotate 0                                  // no rotation
// radar HUD blend                                 // UI-only, no cvar
// radar blur                                      // UI-only, no cvar
cl_hud_radar_scale 1.0
cl_radar_scale 0.33
cl_radar_square_with_scoreboard 1                  // square on scoreboard (Y)
cl_radar_square 0                                  // don't force square
// radar dynamic zoom                              // UI-only, no cvar

// radar toggle: N = swap between zoomed-in and full map
bind "n" "toggle cl_radar_scale 0.33 0.7; toggle cl_radar_always_centered 0 1; toggle cl_radar_square 0 1"
bind "y" "+showscores"                             // scoreboard + square radar

// === CROSSHAIR ===
cl_crosshairstyle 4                                // static
cl_crosshair_friendly_warning 1                    // in danger zone
cl_crosshair_recoil false
cl_crosshairdot true
cl_crosshairsize 1
cl_crosshairthickness 0.5
cl_crosshairgap -3.0
cl_crosshair_drawoutline false
cl_crosshaircolor 5                                // custom RGB
cl_crosshaircolor_R 27
cl_crosshaircolor_G 195
cl_crosshaircolor_B 144
cl_crosshairusealpha true
cl_crosshairalpha 250
cl_crosshair_t false
cl_crosshairgap_useweaponvalue false               // no deployed weapon gap
cl_show_observer_crosshair 2                       // show everyone's crosshairs
cl_crosshair_show_when_spectating_bot 0            // never show mine on bots

// === SNIPER SIGHTS ===
cl_sniper_delay_unscope false                       // no scope delay
cl_sniper_auto_rezoom true
cl_crosshair_sniper_width 2
cl_sniper_show_inaccuracy 1                        // show scope inaccuracy circle

// === GRENADE LINEUP ===
cl_grenadecrosshair_keepusercrosshair 1            // keep crosshair during lineup
cl_grenadecrosshairdelay_flash 0.0                 // instant reticle
cl_grenadecrosshairdelay_explosive 0.0
cl_grenadecrosshairdelay_fire 0.0
cl_grenadecrosshairdelay_smoke 0.0
cl_grenadecrosshairdelay_decoy 0.0

// === DAMAGE PREDICTION ===
cl_predict_body_shot_fx 0
cl_predict_head_shot_fx 0
cl_predict_kill_ragdolls 0

// === TELEMETRY ===
cl_hud_telemetry_frametime_show 2                  // FPS always
cl_hud_telemetry_frametime_poor 100                // 10 fps threshold
cl_hud_telemetry_ping_show 1                       // ping if poor
cl_hud_telemetry_ping_poor 100
cl_hud_telemetry_net_misdelivery_show 1            // network if poor
cl_hud_telemetry_net_misdelivery_poor 5.0
cl_hud_telemetry_net_quality_graph_show 0          // jitter off
cl_hud_telemetry_net_detailed 0

// === BINDS ===
bind mwheeldown +jump                              // bhop
bind space +jump

bind z "use weapon_flashbang"
bind x "use weapon_smokegrenade"
bind c "use weapon_hegrenade"
bind v "use weapon_molotov; use weapon_incgrenade"  // both T and CT variants

bind "," "playerradio Radio.HoldPosition"          // bot: stay
bind "." "playerradio Radio.Followme"              // bot: follow

bind q "+qsw"                                      // quick switch (no rescope)
alias +qsw "slot3"
alias -qsw "lastinv"

alias "+jtb" "+jump"                               // jump throw
alias "+jtc" "-attack; -attack2"
alias "+jtd" "-jump"
bind mouse4 "+jtb; +jtc; +jtd"

// === MOUSE ===
sensitivity 1.16                                  // for 1600 DPI (eDPI 1856)
zoom_sensitivity_ratio_mouse 1.0
m_rawinput 1

// === PERFORMANCE ===
cl_disable_ragdolls 1                              // remove death bodies
engine_low_latency_sleep_after_client_tick true     // reduce input latency

// === NETWORK ===
cl_interp 0.015625
cl_updaterate 128
cl_cmdrate 128

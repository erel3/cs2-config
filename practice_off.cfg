// === PRACTICE OFF — reset state and unbind practice keys ===

// === SERVER STATE ===
// Reset cheat-protected cvars BEFORE turning sv_cheats off — otherwise changes are rejected
bot_stop 0
bot_crouch 0
sv_infinite_ammo 0
sv_showimpacts 0
sv_showbullethits 0
sv_showimpacts_penetration 0
sv_grenade_trajectory_prac_pipreview 0
host_timescale 1
weapon_accuracy_nospread false
cl_showpos 0
spec_show_xray 0
god 0                                               // disable invincibility
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0
mp_randomspawn 0
mp_ignore_round_win_conditions 0
mp_autokick 1
sv_alltalk 0
sv_cheats 0                                         // last — locks the cvars above at their reset values

// === MATCH CVARS (not cheat-protected — reset after sv_cheats) ===
mp_freezetime 15
mp_roundtime_defuse 1.92
mp_roundtime 1.92
mp_roundtime_hostage 1.92
mp_buytime 20
mp_buy_anywhere 0
mp_startmoney 800
mp_maxmoney 16000
mp_ct_default_grenades 0
mp_t_default_grenades 0
mp_solid_teammates 1

// === RESTORE PRACTICE KEYS TO DEFAULTS ===
unbind "'"
unbind j
unbind k
unbind l
unbind i
unbind o
unbind p
unbind "["
unbind "]"
unbind "="
unbind h
unbind "-"

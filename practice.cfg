// === PRACTICE MODE ===
sv_cheats 1
bot_kick
mp_warmup_end
mp_freezetime 0
mp_roundtime_defuse 60

// === GRENADES ===
sv_infinite_ammo 1
ammo_grenade_limit_total 6
sv_grenade_trajectory_prac_pipreview 1
sv_grenade_trajectory_prac_trailtime 15
sv_rethrow_last_grenade 1

// === SHOOTING (toggled with =) ===
sv_showimpacts 0
sv_showimpacts_time 10
sv_showbullethits 0
sv_showimpacts_penetration 0                       // toggled with =

// === MONEY / BUY ===
mp_startmoney 65535
mp_maxmoney 65535
mp_buytime 9999
mp_buy_anywhere 1

// === RESPAWN / TEAMS ===
mp_respawn_on_death_ct 1                           // auto-respawn on death
mp_respawn_on_death_t 1
mp_limitteams 0
mp_autoteambalance 0
mp_randomspawn 1                                   // random spawn positions
mp_teammates_are_enemies 0
mp_friendlyfire 0
sv_deadtalk 1
mp_solid_teammates 0

// === MOVEMENT ===
god                                                // invincibility

// === VISIBILITY ===
spec_show_xray 1                                   // x-ray player outlines

// === BINDS ===
bind "'" "mp_restartgame 1"                        // restart round
bind j "ent_fire smokegrenade_projectile kill; ent_fire flashbang_projectile kill; ent_fire hegrenade_projectile kill; ent_fire molotov_projectile kill; ent_fire inferno kill; ent_fire decoy_projectile kill" // clear ALL grenades/fire
bind k "sv_rethrow_last_grenade"                   // rethrow last grenade
bind l "noclip"                                    // fly through walls

// === BOTS (I O P [ ] row) ===
bind i "bot_add_t; bot_place"                      // add T bot at crosshair
bind o "bot_add_ct; bot_place"                     // add CT bot at crosshair
bind p "bot_kick"                                  // kick all bots
bot_stop 1
bot_crouch 0
bind "[" "toggle bot_stop 0 1"                     // toggle bots freeze/move
bind "]" "toggle bot_crouch 0 1"                   // toggle bots crouch/stand

// === TOOLS (reset to default state on exec) ===
cl_showpos 0
host_timescale 1
weapon_accuracy_nospread false
bind "=" "toggle cl_showpos 0 1; toggle sv_showimpacts 0 1; toggle sv_showbullethits 0 1; toggle sv_showimpacts_penetration 0 1" // toggle debug info
bind u "toggle host_timescale 1 0.25"              // slow-mo toggle
bind "-" "toggle weapon_accuracy_nospread false true" // no-spread toggle

// === RESTART ===
mp_restartgame 1

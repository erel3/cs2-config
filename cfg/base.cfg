// === KEYBINDS RESET (clean slate + game defaults) ===
// Clears any leftover binds, then restores CS2 defaults.
// binds.cfg (optional) overrides select keys after this.
unbindall
bind "ESCAPE"    "cancelselect"
bind "`"         "toggleconsole"
bind "TAB"       "+showscores"
bind "SPACE"     "+jump"
bind ","         "buyammo1"
bind "."         "buyammo2"
bind "0"         "slot10"
bind "1"         "slot1"
bind "2"         "slot2"
bind "3"         "slot3"
bind "4"         "slot4"
bind "5"         "slot5"
bind "6"         "slot6"
bind "7"         "slot7"
bind "8"         "slot8"
bind "9"         "slot9"
bind "a"         "+left"
bind "b"         "buymenu"
bind "c"         "+radialradio"
bind "d"         "+right"
bind "e"         "+use"
bind "f"         "+lookatweapon"
bind "g"         "drop"
bind "h"         "switchhands"
bind "i"         "show_loadout_toggle"
bind "m"         "teammenu"
bind "q"         "lastinv"
bind "r"         "+reload"
bind "s"         "+back"
bind "t"         "+spray_menu"
bind "u"         "messagemode2"
bind "v"         "+radialradio2"
bind "w"         "+forward"
bind "x"         "slot12"
bind "y"         "messagemode"
bind "z"         "radio"
bind "CTRL"      "+duck"
bind "SHIFT"     "+sprint"
bind "F3"        "autobuy"
bind "F4"        "rebuy"
bind "F5"        "jpeg"
bind "F6"        "save quick"
bind "F7"        "load quick"
bind "F10"       "cs_quit_prompt"
bind "MWHEELDOWN" "invnext"
bind "MWHEELUP"  "invprev"
bind "MOUSE1"    "+attack"
bind "MOUSE2"    "+attack2"
bind "MOUSE3"    "player_ping"
bind "MOUSE4"    "+voicerecord"
bind "MOUSE_X"   "yaw"                             // mouse look — wiped by unbindall
bind "MOUSE_Y"   "pitch"
bind "DEL"       "sellbackall"

// === VIDEO (console-only) ===
r_player_visibility_mode 1
r_show_build_info false                            // hide build info overlay
fps_max 400
fps_max_ui 200

// === AUDIO ===
volume 1
snd_headphone_eq 1                                // Crisp
snd_spatialize_lerp 0.7                           // L/R isolation 70%
snd_steamaudio_enable_perspective_correction 0     // perspective correction off
snd_mute_losefocus 0                              // play audio in background
snd_mixahead 0.05                                 // lower audio latency
speaker_config 3                                   // optimized speaker config
snd_mute_mvp_music_live_players true               // mute MVP music when players alive
snd_voipvolume 1.0                                 // teammate voice volume

// === MUSIC ===
snd_menumusic_volume 0
snd_roundstart_volume 0
snd_roundaction_volume 0
snd_roundend_volume 0
snd_mvp_volume 0
snd_deathcamera_volume 0
snd_tensecondwarning_volume 0.1225                // ~35% on slider (sqrt scale)
snd_mapobjective_volume 0

// === GAME ===
con_enable 1
mm_dedicated_search_maxping 150
rate 786432                                        // unrestricted
cl_interp_ratio 1                                  // no buffering
gameinstructor_enable 0                            // no tutorial hints
cl_autohelp false                                  // no auto-help popups
cl_net_buffer_ticks 0                              // no extra network buffering
net_client_steamdatagram_enable_override 1         // force Steam Datagram relay

// === HUD ===
hud_scaling 1
cl_hud_color 0                                     // teammate color
hud_showtargetid 0                                 // hide enemy name under crosshair

// === DAMAGE PRINTOUT (round-end summary on screen) ===
developer 1
con_filter_enable 2
con_filter_text "damage"

// === TEAM ===
cl_teamid_overhead_mode 3                          // pips + names + health + equipment
cl_teamid_overhead_always 1                        // always show teammate info through walls
cl_teamid_overhead_fade_near_crosshair 0.8         // fade teammate icons near crosshair
cl_teammate_colors_show 1                          // show colors in competitive
lobby_default_privacy_bits2 1                      // friends can join
+cl_show_team_equipment                            // show teammate loadouts through walls

// === COMMUNICATION ===
cl_mute_enemy_team 0
cl_mute_all_but_friends_and_party 0
cl_allow_animated_avatars 0
cl_hide_avatar_images 0                            // show all
cl_sanitize_player_names 0

// === SPECTATOR ===
cl_scoreboard_mouse_enable_binding +attack2        // secondary fire

// === ITEM ===
cl_silencer_mode 0                                 // don't detach silencer
r_drawtracers_firstperson 0                        // hide own bullet tracers
switchhandsright                                   // right hand viewmodel
cl_showloadout 1                                   // always show inventory
cl_use_opens_buy_menu 1
cl_buywheel_donate_key 0                           // donation key = Left Ctrl

// === RADAR ===
cl_radar_always_centered 0                         // don't center on player
cl_radar_rotate 0                                  // no rotation
cl_hud_radar_scale 1.0
cl_radar_scale 0.33
cl_radar_square_with_scoreboard 1                  // square on scoreboard

// radar toggle: N = swap between overview and zoomed (defaults set above)
bind "n" "toggle cl_radar_scale 0.33 0.7; toggle cl_radar_always_centered 0 1; toggle cl_radar_rotate 0 1"

// === SNIPER SIGHTS ===
cl_sniper_delay_unscope false                       // no scope delay
cl_sniper_auto_rezoom true
cl_crosshair_sniper_width 2
cl_sniper_show_inaccuracy 1                        // show scope inaccuracy circle

// === GRENADE LINEUP ===
cl_grenadecrosshair_keepusercrosshair 1            // keep crosshair during lineup
cl_grenadecrosshairdelay_flash 0.0                 // instant reticle
cl_grenadecrosshairdelay_explosive 0.0
cl_grenadecrosshairdelay_fire 0.0
cl_grenadecrosshairdelay_smoke 0.0
cl_grenadecrosshairdelay_decoy 0.0

// === DAMAGE PREDICTION ===
cl_predict_body_shot_fx 0
cl_predict_head_shot_fx 0
cl_predict_kill_ragdolls 0

// === TELEMETRY (FPS only) ===
cl_hud_telemetry_frametime_show 2                  // FPS always
cl_hud_telemetry_frametime_poor 100                // 10 fps threshold
cl_hud_telemetry_ping_show 0                       // off
cl_hud_telemetry_net_misdelivery_show 0            // off
cl_hud_telemetry_net_quality_graph_show 0          // off
cl_hud_telemetry_net_detailed 0

// === PERFORMANCE ===
engine_low_latency_sleep_after_client_tick true     // reduce input latency
engine_no_focus_sleep 0                            // instant alt-tab return
func_break_max_pieces 0                            // no glass/vent debris
enable_boneflex false                              // disable facial animations
// cl_ragdoll_limit 0                              // remove dead bodies (uncomment if wanted)

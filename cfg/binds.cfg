// === BINDS (overrides on top of base.cfg defaults) ===

// unused keys
unbind i                                           // loadout HUD (we force cl_showloadout 1)
unbind h                                           // switchhands (freed for practice slow-mo)
unbind "MWHEELUP"

// grenades: letters + decoy on 4
bind z "slot7"                                     // flashbang
bind x "slot8"                                     // smoke
bind c "slot6"                                     // HE grenade
bind v "slot10"                                    // molotov/incendiary
bind "4" "slot9"                                   // decoy
unbind "6"
unbind "7"
unbind "8"
unbind "9"

bind mwheeldown +jump                              // bhop (overrides invnext)

bind "," "playerradio Radio.HoldPosition"          // bot: stay
bind "." "playerradio Radio.Followme"              // bot: follow

bind q "+qsw"                                      // quick switch (no rescope)
alias +qsw "slot3"
alias -qsw "lastinv"

// mute incoming voice toggle with audio feedback (pingpong aliases — `toggle` can't branch on state)
alias v_mute   "snd_voipvolume 0; play sounds/ui/menu_invalid.vsnd_c; alias v_toggle v_unmute"
alias v_unmute "snd_voipvolume 1; play sounds/ui/menu_accept.vsnd_c;  alias v_toggle v_mute"
alias v_toggle v_mute
bind "/" v_toggle

// drop bomb (press CAPSLOCK → switch to C4, release → drop + lastinv)
// NOTE: avoid modifier keys (ALT/CTRL/SHIFT) — OS hijacks them (Alt-Tab drops your gun)
alias "+dropbomb" "slot5"
alias "-dropbomb" "drop; lastinv"
bind "CAPSLOCK" "+dropbomb"
